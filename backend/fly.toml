app = "scd-api-roslan"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  SCD_DATABASE_PATH = "/data/scd.db"
  SCD_RODAGE_ACTIF = "true"

[mounts]
  source = "scd_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  internal_port = 8000
  protocol = "tcp"
  [[services.ports]]
    handlers = ["http"]
    port = 80
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
